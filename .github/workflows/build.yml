# This workflow generates JSON schemas from the EL.data.model.csv, registers them
# in a Synapse organization, and posts a summary report as a PR comment.
#
# Triggered on:
#   - Pull requests to main (changes in modules/ or EL.data.model.csv) → registers to test org
#   - Pre-release published                                       → registers to test org
#   - Full release published                                      → registers to production org
#
# Steps:
#   1. Clear schemas directory  - removes pre-existing schemas to prevent stale files from being registered
#   2. Generate JSON Schemas    - converts EL.data.model.csv into JSON schema files
#   3. List generated schemas   - logs generated schema files for visibility
#   4. Check schemas generated  - fails early if no schemas were produced
#   5. Upload schemas           - saves generated schemas as a workflow artifact
#   6. Resolve schema org       - selects test or production Synapse org based on trigger
#   7. Register schemas         - registers schemas in the resolved Synapse org
#   8. Format Schema Report     - builds a markdown summary of generated/registered schemas
#   9. Comment PR               - posts the report as a comment on the pull request
#
# Required secrets:
#   TOKEN - Synapse Personal Access Token with permissions to register schemas

name: Build

on:
  pull_request:
    types:
      - opened
      - synchronize
      - labeled
    branches:
      - "main"
    paths:
      - "modules/**"
      - "EL.data.model.csv"

  release:
    types:
      - published
      - released
      
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.triggering_actor }}
  cancel-in-progress: true

jobs:
  generate-and-register-schemas:
    runs-on: ubuntu-latest
    if: github.triggering_actor != 'commit-to-main-bot-adkp[bot]'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      # temporary hack to ensure clean directory before generating new schemas, since the generator doesn't currently delete old files
      - name: Clear schemas directory
        run: rm -rf ./schemas && mkdir -p ./schemas

      - name: Generate JSON Schemas
        id: generate
        uses: Sage-Bionetworks-Actions/generate-jsonschema@main
        with:
          data-model-source: ./EL.data.model.csv
          data-model-labels: "display_label"

      - name: List generated schemas
        run: |
          echo "Generated schemas:"
          ls -la ./schemas/

      - name: Check schemas were generated
        if: steps.generate.outputs.schemas-json == '[]'
        run: |
          echo "::error::No schemas were generated. Stopping workflow."
          exit 1

      - name: Upload schemas as artifacts
        uses: actions/upload-artifact@v6
        with:
          name: json-schemas
          path: "**/*.json"


      - name: Resolve schema organization
        id: resolve-org
        run: |
          # released → production org (full release published, or pre-release promoted to release)
          # published → test org (pre-release)
          # pull_request → test org
          if [[ "${{ github.event.action }}" == "released" ]]; then
            echo "org-name=linglp.test.fakeprod.schemas" >> $GITHUB_OUTPUT
            echo "🚀 Production: deploying to linglp.test.fakeprod.schemas"
          else
            echo "org-name=linglp.test.schemas" >> $GITHUB_OUTPUT
            echo "🧪 Test: deploying to linglp.test.schemas"
          fi

      - name: Register schemas in Synapse
        id: register
        uses: Sage-Bionetworks-Actions/register-jsonschema@0.1.0
        with:
          org-name: ${{ steps.resolve-org.outputs.org-name }}
          schema-dir: ${{ steps.generate.outputs.schemas }}
          synapse-auth-token: ${{ secrets.TOKEN }}
          version: ${{ github.event.release.tag_name }}
          fix-schema-name: true

      - name: Format Schema Report
        id: format
        run: |
          python - <<'PYTHON'
          import json
          import os

          schemas_json = r'''${{ steps.generate.outputs.schemas-json }}'''
          org_name = r'''${{ steps.resolve-org.outputs.org-name }}'''
          registered_uris_raw = r'''${{ steps.register.outputs.uris }}'''

          schemas = json.loads(schemas_json)
          schema_by_name = {s.get('title', ''): s for s in schemas}

          # Build a mapping of schema name to its registered URL
          # URIs output is newline-separated schema IDs (e.g. "org-SchemaName-version")
          SYNAPSE_BASE = "https://repo-prod.prod.sagebase.org/repo/v1"
          uri_by_name = {}
          for schema_id in [u.strip() for u in registered_uris_raw.splitlines() if u.strip()]:
              for name in schema_by_name:
                  if f"{org_name}-{name}" in schema_id:
                      uri_by_name[name] = f"{SYNAPSE_BASE}/schema/type/registered/{schema_id}"
                      break

          def render_properties(schema_dict):
              result = ""
              properties = schema_dict.get('properties', {})
              required_props = schema_dict.get('required', [])
              if properties:
                  result += "**Properties:**\n\n"
                  result += "| Property | Type | Required |\n"
                  result += "|----------|------|----------|\n"
                  for prop_name, prop_def in properties.items():
                      prop_type = prop_def.get('type', 'any')
                      if isinstance(prop_type, list):
                          prop_type = ', '.join(prop_type)
                      is_required = '✓' if prop_name in required_props else ''
                      result += f"| `{prop_name}` | {prop_type} | {is_required} |\n"
              return result

          report = "## Generated JSON Schemas\n\n"
          report += f"**Organization:** `{org_name}`\n\n"
          report += f"**Total Schemas Generated:** {len(schemas)}\n\n"

          for schema_dict in schemas:
              name = schema_dict.get('title', '')
              uri = uri_by_name.get(name)
              title = f"<a href=\"{uri}\">{name}</a>" if uri else name
              report += f"<details>\n<summary><strong>{title}</strong></summary>\n\n"
              report += render_properties(schema_dict)
              report += "\n</details>\n\n"

          # Write to file
          with open('schema-report.md', 'w') as f:
              f.write(report)

          # Write to github workflow run summary
          github_step_summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if github_step_summary:
              with open(github_step_summary, 'a') as f:
                  f.write(report)
          PYTHON

      - name: Comment PR with Schema Summary
        if: github.event_name == 'pull_request'
        uses: mshick/add-pr-comment@v2
        with:
          message-path: schema-report.md
          message-id: jsonschema-generation